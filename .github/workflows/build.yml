name: Build

on:
  pull_request:
  push:
    branches: [ main ]
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        jdk: ${{ github.event_name == 'pull_request' && fromJSON('["17", "21", "25"]') || fromJSON('["17"]') }}

    steps:
      - name: Checkout (release)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0  # full history so current commit has its tag for nebula-release useLastTag

      - name: Checkout (non-release)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@v6

      - uses: gradle/actions/wrapper-validation@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ matrix.jdk }}
          cache: gradle

      - name: Build (PR)
        if: github.event_name == 'pull_request'
        run: ./gradlew build --stacktrace --parallel --scan

      - name: Build (Main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./gradlew build --stacktrace --parallel --scan

      - name: Debug (release git state)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "github.ref=${{ github.ref }}"
          git log -1 --oneline
          git describe --tags --exact-match 2>/dev/null || git describe --tags || true
          git tag -l 'v*' | tail -3

      - name: Build (Release)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          ./gradlew -Prelease.useLastTag=true build final --stacktrace --scan